        <!-- INÍCIO DO CÓDIGO VLIBRAS -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');

        async function valida() {
                const email = document.getElementById('email').value;
                const senha = document.getElementById('senha').value;

                if (!email || !senha) {
                    const div = document.getElementById('mensagem');
                    div.textContent = 'Preencha todos os campos.';
                    div.classList.add('msg-erro');
                    return;
                }

                const formData = new FormData();
                formData.append('email', email);
                formData.append('senha', senha);

                const response = await fetch('/exercicios/banco/login.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.status === 'ok') {
                    // redireciona para home.php
                    window.location.href = '/exercicios/home.php';
                } else {
                    // volta pro login com mensagem de erro
                    window.location.href = './login.html?msg=' + encodeURIComponent(result.msg) + '&type=erro';
                }
            }

    </script>
    <!-- FIM DO CÓDIGO VLIBRAS -->

    <div class="login-container">
    <form method="post">
        <fieldset>
            <legend class="login-title">LOGIN</legend>
            <div id="mensagem"></div>

            <div class="form-group">
                <label for="email" class="label-control">Email</label>
                <input type="email" class="input-control" id="email" required>
            </div>

            <div class="form-group senha-wrapper login-senha">
                <label for="senha" class="label-control">Senha:</label>
                <input type="password" class="input-control" id="senha" required>
                <i class="fa fa-eye olho" onclick="toggleSenha('senha', this)"></i>
            </div>

             <button type="button" class="btn-login" onclick="valida()">Entrar</button>
        </fieldset>

        <div class="button-group">
            <p>ainda não possui cadastro? </p> 
            <button type="button" class="btn-signup" onclick="window.location.href='./Cadastro.html'">Cadastre-se</button>
        </div>
    </form>

    <script>
        // pega parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const msg = params.get("msg");
        const type = params.get("type");

        if (msg) {
        const div = document.getElementById("mensagem");
        div.textContent = msg;
        div.classList.add(type === "sucesso" ? "msg-sucesso" : "msg-erro");
        
        //pra mensagem sumir sozinha
        // depois de 4 segundos, começa a sumir
        setTimeout(() => {
            div.style.opacity = "0";
        }, 3000);

        // depois de 5 segundos, remove do layout
        setTimeout(() => {
            div.style.display = "none";
        }, 4000);

        }

        function toggleSenha(id, icon) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
}

    </script>
