    <script>

            function validarCadastro() {
            const senha = document.getElementById("senha").value;
            const confirmar = document.getElementById("confirmar").value;
            const nick = document.getElementById("nick").value;

            const erroSenha = document.getElementById("erro-senha");
            const erroConfirmar = document.getElementById("erro-confirmar");
            const erroNick = document.getElementById("erro-nick");

            // limpa mensagens
            [erroSenha, erroConfirmar, erroNick].forEach(el => {
                el.textContent = "";
                el.classList.remove("show");
            });


            if (senha.length < 6) {
                erroSenha.textContent = "A senha deve ter pelo menos 6 caracteres.";
                erroSenha.classList.add("show");
                return false;
            }

            if (senha !== confirmar) {
                erroConfirmar.textContent = "As senhas não coincidem.";
                erroConfirmar.classList.add("show");
                return false;
            }

            if (nick.length < 3) {
                erroNick.textContent = "O nick deve ter pelo menos 3 caracteres.";
                erroNick.classList.add("show");
                return false;
            }

                return true;
            }

    </script>

    <script>
        
            window.onload = function() {
                document.getElementById("formCadastro").addEventListener("submit", async function(e) {
                    e.preventDefault();
                    if (!validarCadastro()) return;

                    const formData = new FormData(this);
                    const response = await fetch("/exercicios/banco/cadastro.php", {
                        method: "POST",
                        body: formData
                    });
                    const result = await response.json();
                    console.log(result);
                    if (result.status === "ok") {
                        window.location.href = "/pagina/HTML/login.html?msg=" + encodeURIComponent(result.msg) + "&type=sucesso"; } 
                    else {
                        window.location.href = "/pagina/HTML/login.html?msg=" + encodeURIComponent(result.msg) + "&type=erro";
                        }
                });
            };


    function toggleSenha(id, icon) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
    }
